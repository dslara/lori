services:
  ollama:
    image: ollama/ollama:latest
    container_name: ultralearning-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  openviking:
    image: ghcr.io/volcengine/openviking:v0.2.5
    container_name: ultralearning-openviking
    command: ["openviking-server", "--host", "0.0.0.0"]
    ports:
      - "1933:1933"
    volumes:
      - ${HOME}/.openviking/ov.conf:/app/ov.conf
      - ${HOME}/.openviking/data:/app/data
    environment:
      - OPENVIKING_API_KEY=${OPENVIKING_API_KEY}
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  ollama_data: