services:
  ollama:
    image: ollama/ollama:latest
    container_name: ultralearning-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull qwen3-embedding:4b || true
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  openviking:
    image: ghcr.io/volcengine/openviking:v0.2.5
    container_name: ultralearning-openviking
    command: ["openviking-server", "--host", "0.0.0.0"]
    ports:
      - "1933:1933"
    volumes:
      - ${HOME}/.openviking/ov.conf:/app/ov.conf
      - ${HOME}/.openviking/data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:1933/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  ollama_data: