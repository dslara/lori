services:
  ollama:
    image: ollama/ollama:latest
    container_name: ultralearning-ollama
    ports:
      - "11434:11434"
    volumes:
      - ultralearning_ollama_data:/root/.ollama
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull gemma4:e4b || true
        ollama pull mxbai-embed-large || true
        wait
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  openviking:
    image: ghcr.io/volcengine/openviking:v0.3.8
    container_name: ultralearning-openviking
    command: ["openviking-server", "--host", "0.0.0.0"]
    ports:
      - "1933:1933"
      - "8020:8020"
    volumes:
      - ${HOME}/.openviking/ov.conf:/app/ov.conf
      - ${HOME}/.openviking/data:/app/data
    network_mode: host
    restart: unless-stopped

volumes:
  ultralearning_ollama_data:
    external: true